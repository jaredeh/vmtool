---
- name: Prepare Ubuntu VM for UniFi OS Server
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes

    - name: Install UniFi OS Server prerequisites
      apt:
        name:
          - podman
          - slirp4netns
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Verify podman version
      command: podman --version
      register: podman_version
      changed_when: false
      check_mode: no

    - name: Assert podman version is sufficient
      assert:
        that:
          - "'4.' in podman_version.stdout or '5.' in podman_version.stdout"
        fail_msg: "Podman version is too old. UniFi OS requires 4.3.1+."

# Right now we're downloading the latest installer of Unifi OS Server from https://community.ui.com/releases/
# Then running.